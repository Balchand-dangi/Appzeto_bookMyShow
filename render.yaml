services:
  - type: web
    name: bookmyshow-server
    env: node
    region: singapore
    plan: free
    buildCommand: npm install && cd ../client && npm run build && cd ../server && npm install
    startCommand: node index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGO_URI
        fromDatabase:
          name: bookmyshow-db
          property: connectionString
      - key: CLIENT_URL
        value: https://your-render-domain.onrender.com
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 7d
    healthCheckPath: /api/health

databases:
  - name: bookmyshow-db
    databaseName: bookmyshow
    region: singapore
    plan: free
